<!doctype html>
<html lang="ja" class="scroll-smooth">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>送信完了｜ゼロチェック</title>
  <meta name="robots" content="noindex" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand.green': '#007FFF',
            'brand.green2': '#0066CC',
            'brand.mint': '#EBF5FF',
            'brand.ink': '#1F2937',
            'brand.line': '#E5E7EB'
          },
          boxShadow: {
            soft: '0 10px 30px rgba(0,0,0,0.08)'
          }
        }
      }
    }
  </script>

  <style>
    @keyframes check-in {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-check { animation: check-in 0.6s ease-out both; }
    .animate-fade-up-1 { animation: fade-up 0.6s ease-out 0.3s both; }
    .animate-fade-up-2 { animation: fade-up 0.6s ease-out 0.5s both; }
    .animate-fade-up-3 { animation: fade-up 0.6s ease-out 0.7s both; }
  </style>
</head>

<body class="text-brand.ink bg-gradient-to-b from-white via-brand.mint to-white min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-white/90 backdrop-blur border-b border-brand.line">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="flex items-center gap-3">
        <img src="assets/logo2.png" alt="ゼロチェック" class="h-10 w-auto" />
        <div class="leading-tight">
          <div class="font-semibold">ゼロチェック</div>
          <div class="text-xs text-gray-500">不動産売買 仲介手数料 最大0円</div>
        </div>
      </a>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 flex items-center justify-center px-4 py-16">
    <div class="max-w-lg w-full text-center">

      <!-- Check icon -->
      <div class="animate-check mx-auto w-24 h-24 rounded-full bg-brand.green flex items-center justify-center shadow-soft">
        <svg class="w-14 h-14 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
      </div>

      <!-- Text -->
      <h1 class="animate-fade-up-1 mt-8 text-3xl font-extrabold">送信が完了しました</h1>

      <p class="animate-fade-up-2 mt-4 text-gray-600 leading-relaxed">
        お問い合わせありがとうございます。<br>
        担当者より<span class="font-bold text-brand.ink">1営業日以内</span>にご連絡いたします。<br>
        しばらくお待ちください。
      </p>

      <!-- Back button -->
      <a href="/"
        class="animate-fade-up-3 mt-8 inline-flex items-center justify-center rounded-2xl bg-brand.green px-8 py-4 text-white font-extrabold text-lg shadow-soft hover:bg-brand.green2 transition">
        トップページに戻る
      </a>

      <!-- Contact info -->
      <div class="animate-fade-up-3 mt-8 rounded-2xl bg-white border border-brand.line p-5 shadow-soft">
        <div class="text-sm text-gray-500">お急ぎの場合はお電話ください</div>
        <a href="tel:050-6883-9270" class="mt-1 block text-xl font-bold tracking-wide text-brand.ink hover:text-brand.green transition">
          ☎ 050-6883-9270
        </a>
        <div class="text-xs text-gray-500 mt-1">受付時間 9:30〜20:00</div>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-brand.ink text-white">
    <div class="max-w-6xl mx-auto px-4 py-8 text-center">
      <p class="text-white/50 text-xs">© <span id="year"></span> Vivara Partner Co., Ltd. All rights reserved.</p>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>

</html>
